# GitHub Labels Configuration for open-re
# Apply with: gh label create --repo owner/repo --label-file .github/labels.yml

# Phase Labels
- name: "phase-0"
  color: "0E8A16"
  description: "Phase 0: Research & Documentation"
- name: "phase-1"
  color: "1D76DB"
  description: "Phase 1: Core Platform & MVP"
- name: "phase-2"
  color: "5319E7"
  description: "Phase 2: Intelligence & Ecosystem"
- name: "phase-3"
  color: "BC4C00"
  description: "Phase 3: Scale & Sustainability"

# Type Labels
- name: "documentation"
  color: "0075CA"
  description: "Documentation improvements or additions"
- name: "research"
  color: "F9D0C4"

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --release --all-targets

      - name: Run tests
        run: cargo test --workspace --all-targets

  # Build Docker images
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/worker
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Worker AI
        id: meta-worker-ai
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/worker-ai
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha

      - name: Build and push Worker AI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker-ai
          push: true
          tags: ${{ steps.meta-worker-ai.outputs.tags }}
          labels: ${{ steps.meta-worker-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD > CHANGELOG_TEMP.md
          else
            git log --pretty=format:"- %s (%h)" > CHANGELOG_TEMP.md
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG_TEMP.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ## Docker Images
            - `ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}/worker:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}/worker-ai:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}`
            
            ## Installation
            ```bash
            docker compose pull
            docker compose up -d
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to crates.io (for Rust crates)
  publish-crates:
    name: Publish Crates
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Publish crates
        run: |
          # Publish in dependency order
          cargo publish --manifest-path crates/openre-core/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-config/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-telemetry/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-storage/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-queue/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-plugins/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-analysis/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-ai/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-api/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish --manifest-path crates/openre-cli/Cargo.toml --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # Publish frontend to npm
  publish-npm:
    name: Publish NPM Packages
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Publish packages
        run: |
          cd packages/ui && npm publish --access public
          cd ../api-client && npm publish --access public
          cd ../state && npm publish --access public
          cd ../utils && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


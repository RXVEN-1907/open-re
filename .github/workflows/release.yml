  # Notify
  notify:
    name: Notify Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        if: env.DISCORD_WEBHOOK != ''
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"🚀 **open-re ${{ github.ref_name }}** released! https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"}" \
            $DISCORD_WEBHOOK
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Tweet
        if: env.TWITTER_API_KEY != ''
        uses: ethomson/send-tweet-action@v1
        with:
          status: "🚀 open-re ${{ github.ref_name }} is out! https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }} #reverseengineering #opensource"
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false